# Use admin/pass as user/password credentials to login to openemr (from OE_USER and OE_PASS below)
# MYSQL_HOST and MYSQL_ROOT_PASS are required for openemr
# MYSQL_USER, MYSQL_PASS, OE_USER, OE_PASS are optional for openemr and
#   if not provided, then default to openemr, openemr, admin, and pass respectively.
services:
  mysql:
    restart: always
    image: mariadb:11.8.8@sha256:be1ef4fe5f14589325c08a41c76334097ce66c86264b75e1d28342c742782a61
    command: ['mariadbd', '--character-set-server=utf8mb4']
    volumes:
    - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
      - CMD
      - /usr/local/bin/healthcheck.sh
      - --su-mysql
      - --connect
      - --innodb_initialized
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  openemr:
    restart: always
    image: openemr/openemr:latest@sha256:faf0b8386895ed7ab1891bb7c94012e50a91917113e3ae7111b5287d28546b38
    ports:
    - 80:80
    - 443:443
    volumes:
    - logvolume01:/var/log
    - sitevolume:/var/www/localhost/htdocs/openemr/sites
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
      # Clinical Co-Pilot session-proxy (requires fork image / bind-mounted code with gateway).
      # Production must set COPILOT_INTERNAL_SECRET — no weak default.
      COPILOT_INTERNAL_SECRET: "${COPILOT_INTERNAL_SECRET:?set COPILOT_INTERNAL_SECRET}"
      COPILOT_SIDECAR_URL: "${COPILOT_SIDECAR_URL:-http://copilot-sidecar:8080}"
      COPILOT_GATEWAY_TIMEOUT_SECONDS: "${COPILOT_GATEWAY_TIMEOUT_SECONDS:-120}"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - /usr/bin/curl
      - --fail
      - --insecure
      - --location
      - --show-error
      - --silent
      - https://localhost/meta/health/readyz
      start_period: 3m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  # Clinical Co-Pilot LangGraph sidecar — Compose-internal only (no host ports).
  # Single uvicorn worker; set OPENROUTER_API_KEY in the host environment for live turns.
  copilot-sidecar:
    restart: always
    build:
      context: ../../sidecar
      dockerfile: Dockerfile
    environment:
      COPILOT_INTERNAL_SECRET: "${COPILOT_INTERNAL_SECRET:?set COPILOT_INTERNAL_SECRET}"
      COPILOT_GATEWAY_TOOL_URL: "${COPILOT_GATEWAY_TOOL_URL:-http://openemr/interface/ask_copilot/tool_proxy.php}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-anthropic/claude-haiku-4.5}"
      OPENFDA_API_KEY: "${OPENFDA_API_KEY:-}"
      COPILOT_LLM_TIMEOUT_SECONDS: "${COPILOT_LLM_TIMEOUT_SECONDS:-30}"
      COPILOT_TOOL_TIMEOUT_SECONDS: "${COPILOT_TOOL_TIMEOUT_SECONDS:-10}"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  logvolume01: {}
  sitevolume: {}
  databasevolume: {}
